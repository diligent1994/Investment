spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # 默认使用 dev，可通过环境变量覆盖
  application:
    name: investment

    mybatis-plus:
      type-aliases-package: com.dq.investment.entity
      configuration:
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印SQL
        map-underscore-to-camel-case: true
      global-config:
        db-config:
          id-type: auto
          logic-delete-field: deleted
          logic-delete-value: 1
          logic-not-delete-value: 0
      mapper-locations: classpath*:/mapper/**/*.xml  # 如果使用XML，可以指定
    #  mapper-locations: classpath:mapper/*.xml #仅匹配 classpath:mapper 目录下直接存在的所有.xml 文件（单层）


    logging:
      config: classpath:log4j2.xml