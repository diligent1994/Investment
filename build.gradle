plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
}

bootJar {
    archiveFileName = 'app.jar'
}

group = 'com.dq'
version = '0.0.1-SNAPSHOT'
description = 'Investment'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
    all {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }
}

repositories {
    // 阿里云镜像（覆盖默认仓库）
    maven { url 'https://maven.aliyun.com/repository/public' }
    mavenCentral()
}

dependencies {
    // 1. 排除 spring-boot-starter-web 中的默认日志 (spring-boot-starter-logging)
    implementation('org.springframework.boot:spring-boot-starter-web') {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'
    // ========== 关键：Spring Boot 4.x 专用 MyBatis-Plus 依赖 ==========
    implementation 'com.baomidou:mybatis-plus-spring-boot4-starter:3.5.15' // 核心依赖
    // 分页插件依赖（必须添加，3.5.10版本）
    implementation 'com.baomidou:mybatis-plus-jsqlparser:3.5.15'
    implementation 'com.mysql:mysql-connector-j'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis' // 预留Redis
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
//    runtimeOnly 'com.h2database:h2'
}

tasks.named('test') {
    useJUnitPlatform()
}

// 处理资源文件：确保所有 yml 配置都被打包进 jar
processResources {
    // 关键：设置重复文件策略 = 排除重复（核心修复报错）
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // 仅对配置文件进行变量展开，不额外复制文件
    filesMatching("application*.yml") {
        expand(project.properties)
    }
}