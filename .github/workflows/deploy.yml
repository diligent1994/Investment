name: Build and Push Backend to ACR

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================
      # 【修复核心】指定镜像名 + load: true 加载到本地Docker
      # ======================
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          # 👇 这两行是你缺失的关键！
          load: true
          tags: investment_backend:latest

      # 登录阿里云（不动）
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 打标签+推送（你的命令完全正确，不动）
      - name: Tag and push to Aliyun ACR
        run: |
        #  docker login --username=${{ secrets.ALIYUN_USERNAME }} -p=${{ secrets.ALIYUN_PASSWORD }} ${{ secrets.ALIYUN_REGISTRY }}
          docker tag investment_backend:latest ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/investment_backend:latest
          docker push ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/investment_backend:latest