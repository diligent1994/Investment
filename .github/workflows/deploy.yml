name: Build and Push Backend to ACR

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================
      # 第一步：先构建镜像！！此时不登录阿里云！！用Dockerfile里的公共源拉基础镜像
      # ======================
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # 先只构建，不推送
          tags: springboot-backend:latest

      # ======================
      # 第二步：构建完成后，再登录阿里云私有仓库
      # ======================
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # ======================
      # 第三步：打阿里云标签 + 推送到你的阿里云私有仓库
      # ======================
      - name: Tag and push to Aliyun ACR
        run: |
          docker tag springboot-backend:latest ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/springboot-backend:latest
          docker push ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/springboot-backend:latest