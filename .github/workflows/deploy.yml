name: Build and Push Backend to ACR

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================
      # 第一步：纯构建！全程不登录阿里云！用官方公共镜像拉基础JDK
      # ======================
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true # 把构建好的镜像加载到本地docker环境
          tags: springboot-backend:latest

      # ======================
      # 第二步：构建完成！才登录阿里云私有仓库
      # ======================
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # ======================
      # 第三步：打阿里云私有标签 + 推送镜像
      # ======================
      - name: Tag and push to Aliyun ACR
        run: |
          docker tag springboot-backend:latest ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/springboot-backend:latest
          docker push ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/springboot-backend:latest